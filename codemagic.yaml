workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 120
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.coupleapp.ourspace"
        GRADLE_BUILD_DIR: "android"
    triggering:
      events:
        - push
      branch:
        include:
          - main
    scripts:
      - name: Set up signing config
        script: |
          cd android
          echo $FCI_KEYSTORE_PATH
      - name: Build Android release
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
